<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>
  <!-- Left vertical bar of N -->
  <rect x="8" y="9" width="7" height="30" rx="3.5" fill="white"/>
  <!-- Right vertical bar of N -->
  <rect x="33" y="9" width="7" height="30" rx="3.5" fill="white"/>
  <!-- Staircase diagonal (3 steps ascending left to right) -->
  <path d="M15,39 L21,39 L21,29 L27,29 L27,19 L33,19"
        stroke="white" stroke-width="7"
        stroke-linecap="square" stroke-linejoin="miter"
        fill="none"/>
  <!-- Blue accent dot at top-right corner of staircase -->
  <circle cx="36" cy="9" r="4" fill="#93c5fd"/>
</svg>
